<html lang="ko">
<head>

        }

        }
        .box3-1{

        }
        .box3-2{

        }

</head>

    <div class="box"></div> 
    <label class ="box2">A</label>
    <label class ="box2">B</label>

            <div class = "box3-2"> </div>

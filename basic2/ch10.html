<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        a{
            text-decoration: none;
        }

        a:link{
            color: aqua;
            /* box-shadow: 0 0 10px #003f8355; */
        }

        a:visited{
            color: red;
            /* box-shadow:0 0 10px red; */
        }
        
        .btn    {
            display: inline-block;
            /* outline: 1px solid #888; */
            /* box-shadow: 0 0 1px #888 inset; */
            padding: 2px 7.5px;
            border: 1px solid #888;
            border-radius: 2.5px;
            background-color: #eee;
            color: black;
            font-size: 13.3333px;
            cursor: default;
        }
        .btn:hover{
            background-color: #ddd;
            border: 1px solid #555;
        }
        .btn:active{
            background-color: #eee;
            border: 1px solid #999;

        }
        .btn:disabled{
            border: #ddd;
            background-color: #be0000;

        }
    </style>
</head>
<body>
    <div>
        <a class="btn" href="https://namu.wiki/w/%EC%A7%80%ED%8C%A1%EC%9D%B4%EC%99%80%20%EA%B2%80%EC%9D%98%20%EC%9C%84%EC%8A%A4%ED%86%A0%EB%A6%AC%EC%95%84">확인</a>
        <button class="btn" disabled>확인</button>
        <div class="btn">확인</div>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box{
            margin: 20px;
            box-sizing: border-box; /*기본 값은 content-box // 그러나 box-sizing을 사용하면, border까지 사이즈를 일정하게 맞춰주는 기능을 가진다.*/
            border: 10px solid #222;
            padding: 50px;
            width: 200px;
            height: 200px;
            background-color: #dbdbdb;
        }
        .box2{
            width: 100%;
            height: 100%;
            background-color: yellow;
        }
        .ibox{
            display: inline-block;
            width: 100px;
            height: 100px;
            margin: 20px;
            border: 10px solid yellow;
            padding: 20px;
            background-color: pink;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="box2"></div>
    </div>
    <div class="box">
        <div class="box2"></div>
    </div>
    <div>
        <span class="ibox">가나다</span>
        <span class = "ibox">마바사</span>
    </div>
</body>
</html>

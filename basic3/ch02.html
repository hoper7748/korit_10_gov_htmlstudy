<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // 함수라는 것을 중복되거나 코드에서 분리를 위해 정의하여 [사용!!!] 하려고 만든다.
        function add1(a, b){
            return a + b;
        }

        const add2 = function(a, b){
            return a + b;
        }

        let add3 = function(a, b){
            return a + b;
        }

        console.log(add1(10, 20));
        console.log(add2(10, 20));
        console.log(add3(10, 20));
        // 자바에서 작동은 안됨.
        console.log(function(a, b){return a + b}(10, 20));

        let add4 = (a,b)=> a + b;
        console.log(add4(1, 2));
        const add5 = (a, b) => {
            return a + b;
        }

        console.log(add5(10, 20));
    </script>
</body>
</html>

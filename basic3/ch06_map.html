        // map(mapping) -> 1대 1로 대응한다.

        // ["AA", "BB", "CC"] -> ["aa", "bb", "cc"]
        // [{name: "AA"}, {name: "BB"}, {name: "CC"}]
        // ["AA", "BB", "CC"]

        const arrayObject = {
            arr: [],
            map: (mapFx) => {
                const newArray = [];
                for(let array of arrayObject.arr){
                    newArray.push(mapFx(array));
                }
                return newArray;
            },
            filter: (predicate ) =>{
                const newArray = [];
                for(let array of arrayObject.arr ){
                    if(predicate(array)){
                        newArray.push(array);
                    }
                }
                return newArray;
            }
        }

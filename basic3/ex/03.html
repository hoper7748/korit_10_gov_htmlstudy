<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        console.log(10 == "10");    // 참
        console.log(10 === "10");   // 거짓
        console.log(10 != "10");    // 거짓
        console.log(10 !== "10");   // 참
        console.log(5 >= 5);        // 참
        console.log(null == undefined); // 참
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let age = 20, isMember = false;
        if(age >= 18 && isMember == true){
            console.log("회원 전용 서비스 이용 가능");
        } else if (age >= 18 && !isMember){
            console.log("회원가입 후 이용해 주세요.");
        } else if (age < 18){
            console.log("애들은 가라");
        }
    </script>
</body>
</html>

        function calc(run, ...nums){
            return run(nums);
        }

        function addition(nums){
            return nums === 0 ? 0 : nums + addition(nums - 1);
        }

        function factorial(num){
            return num === 0 || num === 1 ? 1: num * factorial(num - 1);
        }

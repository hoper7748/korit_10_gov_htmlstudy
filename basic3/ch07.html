<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body{
            width: 0px;
            height: 100vh;
        }

        .container{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            width: 1200px;
            height: 100%;
            overflow: auto;
        }
        .card   {
            /* display: flex; */
            /* flex-direction: column; */
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            box-shadow: 0 0 5px #00000044;
            width: 400px;
            padding: 10px
        }

        .input-box{
            position: relative; 
            margin-bottom: 15px;
            box-sizing: border-box;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 5px 10px;
            width: 100%;
            height: 50px;
            overflow: hidden;

            & > label{ /* input-box 하위 요소 label의 기능을 넣어줌*/
                transition: all 0.3s ease-in-out;
                transform: translateY(-50%);
                position: absolute;
                top:50%;
                left: 10px;
                background-color: transparent;
                font-size: 16px;
                color: #444;
            }

            & > input {/* input-box 하위 요소 input의 기능을 넣어줌*/
                transition: all 0.3s ease-in-out;
                position: relative;
                z-index: 10;
                outline: none;
                border: none;
                width: 100%;
                height: 100%;
                background-color: #00000000;
                /* background-color: ; */
            } 
        }

        .register-button{
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            border: 1px solid #dbdbdb;
            width:100% ;
            height: 40px;
            background-color: blue;
            color: #fff;
            cursor: pointer;

            &:hover{
                background-color: #005489;
            }

            &:active{
                background-color: #003e65;
            }

        }
        
        .input-is-not-empty{
            & > label{
                font-size: 12px;
                top: 25%;

            }

            & > input {
                top: 30%;
                height: 80%;
            }
        }
        

    </style>
</head>
<body>
    <!-- 1. input 2개 username password-->
    <!-- 2. button 1개 -->
    <div class="container">
        <div class="card">
            <div class="input-box input-is-not-empty">
                <input type="text" id="username" name="username" >
                <label for="username">사용자 이름</label>
            </div>
            <div class="input-box">
                <input type="password" id="pw" name="pw">
                <label for="pw">비밀번호</label>
            </div>
            <button class="register-button" type="submit">등록</button>
        </div>
    </div>

    <script>
       
        let userList = [];
        function autoIncrement(){
            let currentId = 0;

            return function() {
                currentId ++;
                return currentId;
            }
        }
        console.log("hello Java Script");
        const getNewId = autoIncrement();
        // 우선 container에 들어있는 input객체를 가져오자
        // const를 받아올 수 없음
        const inputBoxs = document.querySelectorAll(".input-box");
        for(let inputBox of inputBoxs){
            const inputelement = inputBox.querySelector("input");
            inputelement.onfocus = (event) =>{
                inputBox.classList.add("input-is-not-empty");
            }
            inputelement.onblur = (event) =>{
                inputBox.classList.remove("input-is-not-empty");
            }
        }
        const registerbutton = document.querySelector(".register-button");

        registerbutton.addEventListener ("click", () =>{
            const inputs = Array.from(inputBoxs).map(inputbox => inputbox.querySelector("input"))
            let newUser = {
                id: getNewId(),
            }
            Array.from(inputs).forEach(element => {
                const {name, value} = element;
                newUser = {
                    ...newUser,
                    name: value,
 
                } ;
            });
            userList = [
                ...userList,
                newUser,
            ];
            console.log(userList);
        } );

        // registerbutton.onclick = () =>{

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html, body{
            margin : 0;
            height: 100vh; 
        }
        .container{
            display:flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            width:1200px;
            height: 100%;
            overflow: auto
        }

        .card   {
            /* display: flex; */
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            margin-bottom: 20px;
            /* border: 1px solid #dbdbdb; */
            box-shadow: 0 0 5px #00000044;
            width: 500px;
            padding: 10px;
        }

        .input-box{
            position: relative;
            /* display:flex;
            flex-direction: column; */
            margin-bottom: 15px;
            box-sizing: border-box;
            border: 1px solid #dbdbdb;
            border-radius: 4px;
            padding: 5px 10px;
            width: 360px;
            height: 50px;
            overflow: hidden;

            & > label{
                transition: all 0.3s ease-in-out;
                transform: translateY(-50%);
                position: absolute;
                top:50%;
                left:10px;
                background-color: transparent;
                font-size: 16px;
                color:#444;

            }

            & > input {
                transition: all 0.3s ease-in-out;
                position: relative;
                z-index: 10;
                outline: none;
                border: none;
                width: 100%;
                height: 100%;
                background-color: #00000000;
            }
        }
        
        .input-is-not-empty{
            & > label{
                font-size: 12px;
                top: 25%;

            }

            & > input {
                top: 30%;
                height: 80%;
            }
        }
        
        .register-button{
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            border: 1px solid #dbdbdb;
            width: 100%;
            height: 40px;
            background-color: #006caf;
            color: #fafafa;
            cursor: pointer;
            
            &:hover{
                background-color: #005489;
            }

            &:active{
                background-color: #003e65;
            }
        }
        .user-table{
            box-sizing: border-box;
            border: 1px solid #dbdbdb;
            border-right: 4px;
            width: 500px;
            overflow: hidden;
            & th, & td{
                box-sizing: border-box;
                border: 1px solid #dbdbdb;
                padding: 5px 10px;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="input-box input-is-not-empty">
                <input type="text" id="un" name="username" >
                <label for="un">사용자 이름</label>
            </div>
            <div class="input-box">
                <input type="password" id="pw" name="password" >
                <label for="pw">비밀번호</label>
            </div>
            <button class="register-button">사용자 정보 등록</button>
        </div>
            <div class="card">
                <table class="user-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>사용자이름</th>
                            <th>비밀번호</th>
                            <th>삭제</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <!-- <td></td>0 -->
                        </tr>
                    </tbody>
                </table>
            </div>
    </div>


    <script>
        let userList = [];
        function autoIncrement(){
            let currentId = 0;

            return function() {
                currentId ++;
                return currentId;
            }
        }

        const getNewId = autoIncrement();

        const inputBoxs =  document.querySelectorAll(".input-box");
        console.log(inputBoxs);
        for(let inputbox of inputBoxs){
            const inputelement = inputbox.querySelector("input");
            inputelement.onfocus = (event) => {
                inputbox.classList.add("input-is-not-empty");
            };

            inputelement.onblur = (event) => {
                if(!event.target.value)
                    inputbox.classList.remove("input-is-not-empty");
            }
        }
        // const inputElements = document[0].querySelectorAll(".input-box > input");
        const registerbutton = document.querySelector(".register-button");
        registerbutton.onclick = () =>{
            const inputs = Array.from(inputBoxs).map(inputbox => inputbox.querySelector("input"))
            let newUser ={
                id: getNewId(),
            }
            console.log({inputs});
            console.log("  ");
            Array.from(inputs).forEach(element => {
                console.log(element);
                
                const {name, value} = element;
                newUser = {
                    ...newUser,
                    [name]: value,
                    // [element.password]: 
                };

            });
            userList = [
                ...userList, 
                newUser,
            ];
            tablerender();
        }

        function handleDeleteOnClick(id){
            userList= userList.filter(user => user.id !== id);
            tablerender();
        }

        function tablerender(){
            const tbody = document.querySelector(".user-table > tbody");
            tbody.innerHTML = userList.map(user => `
            <tr>
                <td>${user.id}</td>
                <td>${user.username}</td>
                <td>${user.password}</td>
                <td><button onclick = "handleDeleteOnClick(${user.id})">삭제</button></td>
            </tr>`).join("");
        }

        // console.log(userList);
        // const tableList = document.querySelector(".user-table-body");
        // tableList.innerHTML = userList.map(name => `<tr><td>${name.id}</td><td>${name.username}</td><td>${name.password}</td></tr>`).join("");

    </script>
</body>
</html>

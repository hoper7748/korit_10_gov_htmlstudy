<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--표의 사용 방법은 상당히 중요한 요소-->
    <table>
        <tr>
            <thead>
                <tr>
                    <th rowspan="2">요일(오전,오후)</th>
                    <th colspan="2">월</th>
                    <th colspan="2">화</th>
                    <th colspan="2">수</th>
                </tr>
                <tr>
                    <th>오전</th>
                    <th>오후</th>
                    <th>오전</th>
                    <th>오후</th>
                    <th>오전</th>
                    <th>오후</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1일</td>
                    <td>1</td>
                    <td>2</td>
                    <td>3</td>
                    <td>4</td>
                    <td>5</td>
                    <td>6</td>
                </tr>
                <tr>
                    <td>2일</td>
                    <td>7</td>
                    <td>8</td>
                    <td>9</td>
                    <td>10</td>
                    <td>11</td>
                    <td>12</td>
                </tr>
            </tbody>
        </tr>
    </table>
</body>
</html>
